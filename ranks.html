<!DOCTYPE html>
<html>
<head>
  <title>Ranks</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background: #0a0f1f;
      color: white;
      font-family: Arial;
    }

    nav {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: linear-gradient(90deg, #001f4d, #007bff);
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
    }

    .shop {
      padding: 20px;
    }

    .item {
      cursor: pointer;
      margin: 10px;
      padding: 15px;
      background: #111a33;
      border-radius: 10px;
      border: 1px solid #007bff;
      transition: 0.3s;
    }

    .item:hover {
      box-shadow: 0 0 15px #007bff;
    }

    .perks {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: 0.3s;
    }

    .perks.show {
      max-height: 200px;
      opacity: 1;
    }

    button {
      padding: 8px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    .locked {
      background: gray;
    }

    #rewardScreen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #rewardScreen img {
      max-width: 90%;
      max-height: 90%;
      border: 3px solid red;
      box-shadow: 0 0 40px red;
    }
  </style>
</head>

<body>

<nav>
  <h2>⚡ TenterMC</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="ranks.html">Ranks</a>
    <a href="kits.html">Kits</a>
    <a href="money.html">Money</a>
  </div>
</nav>

<div class="shop">

  <div class="item" onclick="togglePerks('ghoul')">
    <h3>Ghoul Rank - ₹99</h3>
    <div id="ghoul" class="perks">
      <p>✔ Basic perks<br>✔ 1.5x money</p>
      <button onclick="buyNow('Ghoul Rank')">Buy</button>
    </div>
  </div>

  <div class="item" onclick="togglePerks('chad')">
    <h3>Chad Rank - ₹180</h3>
    <div id="chad" class="perks">
      <p>✔ 2x money<br>✔ Extra homes</p>
      <button onclick="buyNow('Chad Rank')">Buy</button>
    </div>
  </div>

  <div class="item" onclick="togglePerks('blaze')">
    <h3>Blaze Rank - ₹299</h3>
    <div id="blaze" class="perks">
      <p>✔ Special kit<br>✔ /chest</p>
      <button onclick="buyNow('Blaze Rank')">Buy</button>
    </div>
  </div>

  <div class="item" onclick="togglePerks('piro')">
    <h3>PIRO Rank - ₹399</h3>
    <div id="piro" class="perks">
      <p>✔ 5x money<br>✔ All perks</p>
      <button onclick="buyNow('PIRO Rank')">Buy</button>
    </div>
  </div>

  <div class="item">
    <h3>💀 DEADLIEST - Unobtainable</h3>
    <button class="locked" id="deadliestBtn">Unavailable</button>
  </div>

</div>

<div id="rewardScreen">
  <img src="./rage_bait.png">
</div>

<script>

// perks toggle
function togglePerks(id) {
  const el = document.getElementById(id);
  el.classList.toggle("show");
}

// checkout
function buyNow(item) {
  window.location.href = "checkout.html?item=" + encodeURIComponent(item);
}

// easter egg
let clicks = 0;
const btn = document.getElementById("deadliestBtn");

btn.addEventListener("click", () => {
  clicks++;

  if (clicks === 10) {
    document.body.style.background = "black";
    document.querySelectorAll('.item').forEach(el => {
      el.style.border = "1px solid red";
      el.style.boxShadow = "0 0 20px red";
    });
  }

  if (clicks === 20) {
    unlockZalta();
  }
});

function unlockZalta() {
  document.querySelectorAll('.item').forEach(el => {
    el.style.pointerEvents = "none";
    el.style.opacity = "0.3";
  });

  const secret = document.createElement("div");
  secret.className = "item";
  secret.innerHTML = `
    <h3 style="color:red;">👑 ZALTA RANK</h3>
    <button onclick="claimZalta()">Claim</button>
  `;

  document.querySelector(".shop").prepend(secret);
}

// claim
function claimZalta() {
  const screen = document.getElementById("rewardScreen");
  screen.style.display = "flex";

  setTimeout(() => {
    screen.style.display = "none";
    window.location.href = "index.html";
  }, 3000);
}

</script>

</body>
</html>
