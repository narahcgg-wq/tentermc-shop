<!DOCTYPE html>
<html>
<head>
  <title>Ranks</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body { background:#111; color:white; font-family:Arial; }

    .item {
      margin: 10px;
      padding: 15px;
      background: #222;
      border-radius: 10px;
    }

    button {
      padding: 8px;
      margin-top: 10px;
      cursor: pointer;
      background: red;
      color: white;
      border: none;
      border-radius: 6px;
    }

    #rewardScreen {
      display: none;
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:black;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    #rewardScreen img {
      max-width:90%;
      max-height:90%;
      border:3px solid red;
    }
  </style>
</head>

<body>

<h1>⚡ TenterMC Ranks</h1>

<div class="item">
  <h3>🧟 Ghoul - ₹99</h3>
  <button onclick="goCheckout('Ghoul Rank')">Buy</button>
</div>

<div class="item">
  <h3>💪 Chad - ₹180</h3>
  <button onclick="goCheckout('Chad Rank')">Buy</button>
</div>

<div class="item">
  <h3>🔥 Blaze - ₹299</h3>
  <button onclick="goCheckout('Blaze Rank')">Buy</button>
</div>

<div class="item">
  <h3>⚡ PIRO - ₹399</h3>
  <button onclick="goCheckout('PIRO Rank')">Buy</button>
</div>

<!-- DEADLIEST -->
<div class="item">
  <h3>💀 DEADLIEST - Unobtainable</h3>
  <button id="deadliestBtn">Unavailable</button>
</div>

<!-- IMAGE OVERLAY -->
<div id="rewardScreen">
  <img src="./rage_bait.png">
</div>

<script>

// 🔹 CHECKOUT
function goCheckout(item) {
  window.location.href = "checkout.html?item=" + encodeURIComponent(item);
}

// 🔹 EASTER EGG
let clicks = 0;
const btn = document.getElementById("deadliestBtn");

btn.addEventListener("click", () => {
  clicks++;

  if (clicks === 10) {
    document.body.style.background = "black";
    document.querySelectorAll('.item').forEach(el => {
      el.style.background = "rgba(255,0,0,0.2)";
      el.style.border = "1px solid red";
    });
  }

  if (clicks === 20) {
    unlockZalta();
  }
});

function unlockZalta() {

  document.querySelectorAll('.item').forEach(el => {
    el.style.pointerEvents = "none";
    el.style.opacity = "0.3";
  });

  const secret = document.createElement("div");
  secret.className = "item";

  secret.innerHTML = `
    <h3 style="color:red;">👑 ZALTA RANK</h3>
    <button onclick="claimZalta()">Claim</button>
  `;

  document.body.prepend(secret);
}

// 🖼️ CLAIM
function claimZalta() {
  const screen = document.getElementById("rewardScreen");
  screen.style.display = "flex";

  setTimeout(() => {
    screen.style.display = "none";
    window.location.href = "index.html";
  }, 3000);
}

</script>

</body>
</html>
