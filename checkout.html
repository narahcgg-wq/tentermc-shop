<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>

  <style>
    body {
      background: linear-gradient(135deg, #0a0f1f, #050816);
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .box {
      background: #111a33;
      border: 1px solid #007bff;
      border-radius: 15px;
      width: 320px;
      margin: 40px auto;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0,123,255,0.3);
    }

    input, button {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }

    input {
      background: #0a0f1f;
      color: white;
      border: 1px solid #007bff;
    }

    button {
      background: #007bff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    img {
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>Checkout</h2>
  <p id="itemName"></p>

  <input type="text" id="username" placeholder="Minecraft Username">
  <input type="text" id="discord" placeholder="Discord ID">

  <button onclick="send()">Request via Discord</button>

  <p id="status"></p>

  <hr>

  <h3>UPI Payment</h3>

  <!-- 🔥 QR (auto generated) -->
  <img src="https://quickchart.io/qr?text=upi://pay?pa=9606635458@fam&pn=TenterMC&cu=INR" width="200">

  <p>UPI: <b>9606635458@fam</b></p>

  <button onclick="paid()">I Paid</button>

</div>

<script>

const webhook = "https://discord.com/api/webhooks/1497646568990441654/zgeTf3Tp1s0b9L43-HK-CWfsodK3m9brU6VAleGxhgbjpzelxunzCQ6FX5GwZd-kXmY1";

// get item
const params = new URLSearchParams(window.location.search);
const item = params.get("item") || "Unknown";
document.getElementById("itemName").innerText = "Buying: " + item;

function send(){

  const user = document.getElementById("username").value;
  const dc = document.getElementById("discord").value;

  if(!user || !dc){
    document.getElementById("status").innerText = "❌ Fill all fields";
    return;
  }

  fetch(webhook,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      content: "<@1483759569132982284>",
      embeds: [{
        title: "🛒 New Order",
        fields: [
          {name:"Minecraft", value:user},
          {name:"Discord", value:dc},
          {name:"Item", value:item}
        ]
      }]
    })
  });

  document.getElementById("status").innerText =
  "✅ Request sent! You will soon receive a DM by the owner";
}

// 💳 UPI BUTTON
function paid(){

  const user = document.getElementById("username").value;
  const dc = document.getElementById("discord").value;

  if(!user || !dc){
    document.getElementById("status").innerText = "❌ Fill all fields";
    return;
  }

  fetch(webhook,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      content: "<@1483759569132982284>",
      embeds: [{
        title: "💳 Payment Claimed",
        description: "User says they paid via UPI",
        fields: [
          {name:"Minecraft", value:user},
          {name:"Discord", value:dc},
          {name:"Item", value:item}
        ]
      }]
    })
  });

  document.getElementById("status").innerText =
  "✅ Payment info sent! Owner will DM you soon";
}

</script>

</body>
</html>
