<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>
  <link rel="stylesheet" href="Style.css">
</head>

<body>

<h2>Checkout</h2>
<p id="itemName"></p>

<input type="text" id="username" placeholder="Minecraft Username"><br><br>
<input type="text" id="discord" placeholder="Discord ID"><br><br>

<button onclick="send()">Send Request</button>

<p id="status"></p>

<script>

const webhook = "https://discord.com/api/webhooks/1497646568990441654/zgeTf3Tp1s0b9L43-HK-CWfsodK3m9brU6VAleGxhgbjpzelxunzCQ6FX5GwZd-kXmY1";

// get item
const params = new URLSearchParams(window.location.search);
const item = params.get("item") || "Unknown";
document.getElementById("itemName").innerText = "Buying: " + item;

function send(){

  const user = document.getElementById("username").value;
  const dc = document.getElementById("discord").value;

  if(!user || !dc){
    document.getElementById("status").innerText = "Fill all fields";
    return;
  }

  fetch(webhook,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      content: "<@1483759569132982284>",
      embeds: [{
        title: "New Order",
        description: "User placed order",
        fields: [
          {name:"Minecraft", value:user},
          {name:"Discord", value:dc},
          {name:"Item", value:item}
        ]
      }]
    })
  });

  document.getElementById("status").innerText = "Request sent! You will soon receive a DM by the owner";
}
</script>

</body>
</html>
